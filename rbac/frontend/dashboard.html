<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — RBAC System</title>
  <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>

<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      </div>
      <div class="brand-text">
        <div class="name">RBAC System</div>
        <div class="tagline">Access Control</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" data-user-initials>?</div>
        <div class="user-info">
          <div class="user-name" data-user-name>—</div>
          <div class="user-role" data-user-role>—</div>
        </div>
        <button class="logout-btn" title="Logout">
          <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <header class="top-bar">
      <div class="page-title">
        <span class="breadcrumb">Home</span>
        <span class="separator">›</span>
        Dashboard
      </div>
      <div class="top-bar-actions">
        <span class="badge badge-role" id="roleLabel">—</span>
      </div>
    </header>

    <main class="content-area">

      <div class="welcome-banner">
        <h2>Welcome back, <span id="welcomeName">—</span> 👋</h2>
        <p>Here's an overview of your system activity.</p>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-icon blue">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          </div>
          <div class="stat-value" id="statUsers">—</div>
          <div class="stat-label">Total Users</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          </div>
          <div class="stat-value" id="statRoles">—</div>
          <div class="stat-label">Roles</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon amber">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          </div>
          <div class="stat-value" id="statReports">—</div>
          <div class="stat-label">Reports</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
          </div>
          <div class="stat-value" id="statModules">—</div>
          <div class="stat-label">Accessible Modules</div>
        </div>
      </div>

      <!-- Recent Activity -->
      <div>
        <div class="section-header">
          <div>
            <div class="section-title">System Overview</div>
            <div class="section-subtitle">Your role and accessible modules</div>
          </div>
        </div>

        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Module</th>
                <th>Create</th>
                <th>Read</th>
                <th>Update</th>
                <th>Delete</th>
              </tr>
            </thead>
            <tbody id="permissionsTable">
              <tr><td colspan="5" class="data-empty"><p>Loading...</p></td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  const user = requireAuth();
  if (user) {
    document.getElementById('welcomeName').textContent = user.name;
    document.getElementById('roleLabel').textContent   = user.role_name;
    loadSidebar('Dashboard');

    // Load stats
    (async () => {
      const [usersRes, rolesRes, reportsRes, modulesRes] = await Promise.all([
        api.get('/users'),
        api.get('/roles'),
        api.get('/reports'),
        api.get('/permissions/modules'),
      ]);

      if (usersRes?.ok)   document.getElementById('statUsers').textContent   = usersRes.data.data?.length   ?? '—';
      if (rolesRes?.ok)   document.getElementById('statRoles').textContent   = rolesRes.data.data?.length   ?? '—';
      if (reportsRes?.ok) document.getElementById('statReports').textContent = reportsRes.data.data?.length ?? '—';

      const modules = modulesRes?.data?.data || [];
      document.getElementById('statModules').textContent = modules.length;

      const tbody = document.getElementById('permissionsTable');
      if (modules.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="data-empty"><p>No modules accessible.</p></td></tr>`;
      } else {
        const check  = `<span style="color:var(--success)">✓</span>`;
        const cross  = `<span style="color:var(--text-muted)">—</span>`;
        tbody.innerHTML = modules.map(m => `
          <tr>
            <td style="font-weight:500">${m.module_name.replace(/([A-Z])/g,' $1').trim()}</td>
            <td style="text-align:center">${m.can_create ? check : cross}</td>
            <td style="text-align:center">${m.can_read   ? check : cross}</td>
            <td style="text-align:center">${m.can_update ? check : cross}</td>
            <td style="text-align:center">${m.can_delete ? check : cross}</td>
          </tr>
        `).join('');
      }
    })();
  }
</script>
</body>
</html>
