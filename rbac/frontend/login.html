<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — RBAC System</title>
  <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <h1>RBAC System</h1>
      <p>Role Based Access Control Platform</p>
    </div>

    <div class="login-card">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your account to continue</p>

      <div id="loginError" style="display:none;background:var(--danger-light);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius-sm);padding:10px 14px;font-size:0.85rem;color:var(--danger);margin-bottom:16px;"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@company.com" autocomplete="email" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required/>
        </div>
        <button type="submit" id="loginBtn" class="btn btn-primary btn-block" style="margin-top:8px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
          </svg>
          Sign In
        </button>
      </form>
    </div>

    <div style="text-align:center;margin-top:20px">
      <p style="color:var(--text-muted);font-size:0.78rem">
        Demo accounts — all passwords: <strong style="color:var(--text-secondary)">Admin@123</strong>
      </p>
      <p style="color:var(--text-muted);font-size:0.75rem;margin-top:6px">
        superadmin@rbac.com &nbsp;|&nbsp; admin@rbac.com &nbsp;|&nbsp; manager@rbac.com &nbsp;|&nbsp; employee@rbac.com
      </p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
