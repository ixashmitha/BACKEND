<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Permission Management — RBAC System</title>
  <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></div>
      <div class="brand-text"><div class="name">RBAC System</div><div class="tagline">Access Control</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" data-user-initials>?</div>
        <div class="user-info"><div class="user-name" data-user-name>—</div><div class="user-role" data-user-role>—</div></div>
        <button class="logout-btn" title="Logout"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="top-bar">
      <div class="page-title"><span class="breadcrumb">Home</span><span class="separator">›</span>Permission Management</div>
      <div class="top-bar-actions"><span class="badge badge-role" id="roleLabel">—</span></div>
    </header>
    <main class="content-area">

      <div class="section-header" style="margin-bottom:24px">
        <div>
          <div class="section-title">Permission Matrix</div>
          <div class="section-subtitle">Configure CRUD permissions per role and module</div>
        </div>
        <button class="btn btn-primary" id="savePermBtn" onclick="savePermissions()" style="display:none">
          <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
          Save Permissions
        </button>
      </div>

      <!-- Role Selector -->
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <label style="font-size:0.85rem;font-weight:500;white-space:nowrap">Select Role:</label>
        <select id="roleSelect" class="form-control" style="max-width:220px" onchange="onRoleChange()">
          <option value="">Choose a role...</option>
        </select>
        <div id="selectedRoleInfo" style="display:none;font-size:0.8rem;color:var(--text-secondary)"></div>
      </div>

      <!-- Permission Matrix -->
      <div id="matrixContainer" style="display:none">
        <div class="perm-matrix">
          <div class="perm-header">
            <span>Module</span>
            <span>Create</span>
            <span>Read</span>
            <span>Update</span>
            <span>Delete</span>
          </div>
          <div id="permissionRows"></div>
        </div>

        <!-- Quick Actions -->
        <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap" id="quickActions">
          <button class="btn btn-secondary btn-sm" onclick="toggleAll(true)">✓ Grant All</button>
          <button class="btn btn-secondary btn-sm" onclick="toggleAll(false)">✗ Revoke All</button>
          <button class="btn btn-secondary btn-sm" onclick="toggleColumn('create')">Toggle Create</button>
          <button class="btn btn-secondary btn-sm" onclick="toggleColumn('read')">Toggle Read</button>
          <button class="btn btn-secondary btn-sm" onclick="toggleColumn('update')">Toggle Update</button>
          <button class="btn btn-secondary btn-sm" onclick="toggleColumn('delete')">Toggle Delete</button>
        </div>
      </div>

      <div id="emptyState" style="text-align:center;padding:60px;color:var(--text-muted)">
        <svg viewBox="0 0 24 24" style="width:48px;height:48px;stroke:var(--text-muted);fill:none;margin-bottom:12px;opacity:0.4"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        <p>Select a role to view and edit its permissions</p>
      </div>

    </main>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/permissions.js"></script>
</body>
</html>
