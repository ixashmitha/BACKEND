<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reports — RBAC System</title>
  <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></div>
      <div class="brand-text"><div class="name">RBAC System</div><div class="tagline">Access Control</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" data-user-initials>?</div>
        <div class="user-info"><div class="user-name" data-user-name>—</div><div class="user-role" data-user-role>—</div></div>
        <button class="logout-btn" title="Logout"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="top-bar">
      <div class="page-title"><span class="breadcrumb">Home</span><span class="separator">›</span>Reports</div>
      <div class="top-bar-actions"><span class="badge badge-role" id="roleLabel">—</span></div>
    </header>

    <main class="content-area">
      <div class="section-header">
        <div>
          <div class="section-title">Reports</div>
          <div class="section-subtitle">Manage and view system reports</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" id="searchInput" class="form-control" placeholder="Search reports..." style="width:220px"/>
          <button class="btn btn-primary" id="addReportBtn" style="display:none" onclick="openAddModal()">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Add Report
          </button>
        </div>
      </div>

      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Title</th>
              <th>Type</th>
              <th>Description</th>
              <th>Created By</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="reportsTableBody">
            <tr><td colspan="7" class="data-empty"><p>Loading reports...</p></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="reportModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Report</div>
      <button class="modal-close" onclick="closeModal('reportModal')"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="reportId"/>
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="reportTitle" class="form-control" placeholder="Report title"/>
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="reportType" class="form-control">
          <option value="General">General</option>
          <option value="Financial">Financial</option>
          <option value="Analytics">Analytics</option>
          <option value="Audit">Audit</option>
          <option value="Performance">Performance</option>
        </select>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="reportDesc" class="form-control" rows="3" placeholder="Optional description" style="resize:vertical"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('reportModal')">Cancel</button>
      <button class="btn btn-primary" id="saveReportBtn" onclick="saveReport()">Save Report</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/reports.js"></script>
</body>
</html>
